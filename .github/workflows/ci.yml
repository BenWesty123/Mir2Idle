name: CI

# Run these checks on every push to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # Safety net: the whole job should finish in ~2 min; never let it hang.
    timeout-minutes: 10
    steps:
      # 1. Grab the repo's code onto the CI machine.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node (matches a modern LTS; the game has no runtime deps).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Match the local dev Node version. Must be >= 21 so `node --test`
          # expands the "tests/**/*.test.mjs" glob instead of treating it as a
          # literal path (Node 20 fails that step).
          node-version: 24
          cache: npm

      # 3. Install dev dependencies (oxlint + playwright) from package-lock.
      - name: Install dependencies
        run: npm ci

      # 4. CI gate: lint + integrity rules + syntax-check every module + unit
      #    tests + release-asset source verify. This deliberately does NOT run
      #    `fixture:offline` (the Playwright 5-minute offline simulations),
      #    which are slow and environment-sensitive on headless Linux - run
      #    those locally with `npm run check` before pushing.
      - name: Run checks
        run: npm run check:ci
