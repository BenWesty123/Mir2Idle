name: CI

# Run these checks on every push to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # 1. Grab the repo's code onto the CI machine.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node (matches a modern LTS; the game has no runtime deps).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Match the local dev Node version. Must be >= 21 so `node --test`
          # expands the "tests/**/*.test.mjs" glob instead of treating it as a
          # literal path (Node 20 fails that step).
          node-version: 24
          cache: npm

      # 3. Install dev dependencies (oxlint + playwright) from package-lock.
      - name: Install dependencies
        run: npm ci

      # 4. The offline fixtures in `npm run check` boot the game in headless
      #    Chromium via Playwright, so the browser binary must be present.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # 5. The full gate: lint + integrity rules + syntax-check every module
      #    + unit tests + offline regression fixtures.
      - name: Run checks
        run: npm run check
